name: Generate Device Tree/Vendor Tree

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'Direct ROM download link'
        required: true
      device_codename:
        description: 'Device codename (e.g. whyred)'
        required: true
      brand:
        description: 'OEM/vendor name (e.g. xiaomi)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y erofs-utils lz4 brotli liblzma-dev wget android-sdk-libsparse-utils
          pip3 install dumpyara aospdtgen

      - name: Dump ROM
        run: |
          mkdir -p dump
          wget -q "${{ github.event.inputs.rom_url }}" -O rom.zip
          python3 -m dumpyara rom.zip -o dump
          rm rom.zip

      - name: Auto-fix proprietary-files.txt
        run: |
          FILE="android/device/${{ github.event.inputs.brand }}/${{ github.event.inputs.device_codename }}/proprietary-files.txt"
          DUMP="$GITHUB_WORKSPACE/dump"
          TMP=$(mktemp)
      
          echo "Fixing proprietary-files.txt with priority: product > vendor > system"
      
          while IFS= read -r line; do
            # Preserve comments & empty lines
            if [[ "$line" =~ ^#.*$ || -z "$line" ]]; then
              echo "$line" >> $TMP
              continue
            fi
      
            # Skip already-correct entries
            if [[ "$line" =~ ^(system|vendor|product)/ ]]; then
              echo "$line" >> $TMP
              continue
            fi
      
            resolved=""
      
            # Priority: product → vendor → system
            if [ -f "$DUMP/product/$line" ]; then
              resolved="product/$line"
            elif [ -f "$DUMP/vendor/$line" ]; then
              resolved="vendor/$line"
            elif [ -f "$DUMP/system/$line" ]; then
              resolved="system/$line"
            elif [ -f "$DUMP/system/system/$line" ]; then
              resolved="system/$line"
            fi
      
            if [ -n "$resolved" ]; then
              echo "$resolved" >> $TMP
            else
              echo "# UNRESOLVED: $line" >> $TMP
            fi
      
          done < "$FILE"
      
          mv $TMP "$FILE"
      
          echo "Done fixing proprietary-files.txt"

      - name: Generate Device Tree
        run: |
          mkdir -p android/device/${{ github.event.inputs.brand }}
          python3 -m aospdtgen dump -o android/device/${{ github.event.inputs.brand }}/${{ github.event.inputs.device_codename }}

      - name: Clone Extract Tools
        run: |
          mkdir -p android/tools android/prebuilts
          git clone https://github.com/LineageOS/android_tools_extract-utils android/tools/extract-utils
          git clone https://github.com/LineageOS/android_prebuilts_extract-tools android/prebuilts/extract-tools

      - name: Verify Device Tree
        run: |
          CODENAME="${{ github.event.inputs.device_codename }}"
          BRAND="${{ github.event.inputs.brand }}"
          DT_PATH=$(find android/device/$BRAND -type d -name "$CODENAME" | head -n 1)

          if [ -z "$DT_PATH" ]; then
            echo "Device tree not found!"
            exit 1
          fi

      - name: Extract Vendor Blobs
        run: |
          CODENAME="${{ github.event.inputs.device_codename }}"
          BRAND="${{ github.event.inputs.brand }}"

          cd android/device/$BRAND/$CODENAME
          export PYTHONPATH=$GITHUB_WORKSPACE/android/tools/extract-utils
          python3 extract-files.py "$GITHUB_WORKSPACE/dump"

      - name: Compress Device Tree
        run: |
          CODENAME="${{ github.event.inputs.device_codename }}"
          BRAND="${{ github.event.inputs.brand }}"

          cd android/device/$BRAND/$CODENAME
          7z a -tzip $GITHUB_WORKSPACE/${CODENAME}_dt.zip ./*
          cd $GITHUB_WORKSPACE

      - name: Compress Vendor Tree
        run: |
          CODENAME="${{ github.event.inputs.device_codename }}"
          BRAND="${{ github.event.inputs.brand }}"

          if [ -d "android/vendor/$BRAND/$CODENAME" ]; then
            cd android/vendor/$BRAND/$CODENAME
            7z a -tzip $GITHUB_WORKSPACE/${CODENAME}_vendor.zip ./*
            cd $GITHUB_WORKSPACE
          fi

          rm -rf dump

      - name: Generate Tag
        id: tag
        run: |
          echo "tag=${{ github.event.inputs.device_codename }}-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Device & Vendor Trees
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Generated device trees for ${{ github.event.inputs.brand }} ${{ github.event.inputs.device_codename }}"
          body: |
            Device Tree and Vendor Tree for ${{ github.event.inputs.device_codename }}.

            - Brand: ${{ github.event.inputs.brand }}
            - Device Codename: ${{ github.event.inputs.device_codename }}
          files: |
            *_dt.zip
            *_vendor.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

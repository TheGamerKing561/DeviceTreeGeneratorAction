name: Generate Device Tree/Vendor Tree

on:
  workflow_dispatch:
    inputs:
      dumper_tool:
        description: 'Choose dumping tool'
        required: true
        default: "dumpyara"
        type: choice
        options:
          - dumpyara
          - dumprx
      rom_url:
        description: 'Direct stock ROM download link (Default: none)'
        required: true
        default: "none"
      generation_type:
        description: 'Select what to generate'
        required: true
        default: "device+vendor+recovery"
        type: choice
        options:
          - device_only
          - recovery_only
          - vendor_only
          - device+vendor
          - device+recovery
          - device+vendor+recovery
      auto_fix_proprietary:
        description: 'Run auto-fix for proprietary-files.txt (if device tree is generated)'
        required: true
        default: true
        type: boolean    
      recovery_image_url:
        description: 'Direct link to custom recovery/boot/vendor_boot image for recovery device tree generation (optional, for "recovery_only")'
        required: false
        default: ""
      device_tree_repo:
        description: 'Device tree repository (required for vendor_only mode)'
        required: false
        default: ""
      device_tree_branch:
        description: 'Device tree branch (default: main)'
        required: false
        default: "main"
      vendor_source_type:
        description: 'Vendor blobs extraction source type (required for vendor_only mode)'
        required: false
        default: "dump_rom"
        type: choice
        options:
          - dump_rom
          - direct_zip
      vendor_only_zip_url:
        description: 'Direct link to custom ROM zip for extracting vendor blobs (used when vendor_source_type = direct_zip)'
        required: false
        default: ""  

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y erofs-utils lz4 brotli liblzma-dev wget android-sdk-libsparse-utils cpio p7zip-full

          pip3 install dumpyara aospdtgen twrpdtgen

          if [ "${{ github.event.inputs.dumper_tool }}" == "dumprx" ]; then
            # Install DumprX
            git clone https://github.com/DumprX/DumprX.git
            cd DumprX
            ./setup.sh
            cd ..
          fi

      - name: Prepare ROM / Vendor Source
        run: |

          # =========================
          # DEVICE / RECOVERY / device+vendor (ROM dump path)
          # =========================
          if [ "${{ github.event.inputs.generation_type }}" != "vendor_only" ]; then

            if [ "${{ github.event.inputs.rom_url }}" != "none" ]; then
              if [ "${{ github.event.inputs.dumper_tool }}" != "dumprx" ]; then
                wget -q --content-disposition "${{ github.event.inputs.rom_url }}"
                ROM_FILE=$(ls -tp | grep -v '/$' | head -n 1)
              fi

              mkdir -p dump

              echo "Using dumper: ${{ github.event.inputs.dumper_tool }}"

              if [ "${{ github.event.inputs.dumper_tool }}" == "dumprx" ]; then

                echo "[*] Running DumprX..."
                ./DumprX/dumper.sh "${{ github.event.inputs.rom_url }}"

                echo "[*] Moving DumprX output to dump folder..."
                cp -r out/* dump/

              else

                echo "[*] Running dumpyara..."
                python3 -m dumpyara "$ROM_FILE" -o dump

              fi
              rm "$ROM_FILE"

              echo "USED_ROM_URL=true" >> $GITHUB_ENV
            fi
          fi

          # =========================
          # VENDOR_ONLY: dump_rom mode
          # =========================
          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ] && \
             [ "${{ github.event.inputs.vendor_source_type }}" == "dump_rom" ]; then

            if [ "${{ github.event.inputs.rom_url }}" == "none" ]; then
              echo "ERROR: rom_url required for vendor_only + dump_rom"
              exit 1
            fi

            if [ "${{ github.event.inputs.dumper_tool }}" != "dumprx" ]; then
              wget -q --content-disposition "${{ github.event.inputs.rom_url }}"
              ROM_FILE=$(ls -tp | grep -v '/$' | head -n 1)
            fi

            mkdir -p dump

            echo "Using dumper: ${{ github.event.inputs.dumper_tool }}"

              if [ "${{ github.event.inputs.dumper_tool }}" == "dumprx" ]; then

                echo "[*] Running DumprX..."
                ./DumprX/dumper.sh "${{ github.event.inputs.rom_url }}"

                echo "[*] Moving DumprX output to dump folder..."
                cp -r out/* dump/

              else

                echo "[*] Running dumpyara..."
                python3 -m dumpyara "$ROM_FILE" -o dump

              fi
            rm "$ROM_FILE"

            echo "USED_ROM_URL=true" >> $GITHUB_ENV
          fi

          # =========================
          # VENDOR_ONLY: direct_zip mode (NO EXTRACTION)
          # =========================
          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ] && \
             [ "${{ github.event.inputs.vendor_source_type }}" == "direct_zip" ]; then

            if [ -z "${{ github.event.inputs.vendor_only_zip_url }}" ]; then
              echo "ERROR: vendor_only_zip_url required for direct_zip"
              exit 1
            fi

            mkdir -p dump

            wget -q "${{ github.event.inputs.vendor_only_zip_url }}" -O dump/rom.zip

            echo "USED_CUSTOM_ZIP=true" >> $GITHUB_ENV
            echo "CUSTOM_ZIP_URL=${{ github.event.inputs.vendor_only_zip_url }}" >> $GITHUB_ENV
          fi

      - name: Clone Device Tree (vendor_only mode)
        if: github.event.inputs.generation_type == 'vendor_only'
        run: |
          if [ -z "${{ github.event.inputs.device_tree_repo }}" ]; then
            echo "Device tree repo is required for vendor_only!"
            exit 1
          fi

          mkdir -p android/device
          git clone --branch "${{ github.event.inputs.device_tree_branch }}" \
            "${{ github.event.inputs.device_tree_repo }}" \
            android/device/tmpdt

            cd android/device/tmpdt

            COMMIT_ID=$(git rev-parse HEAD)
            COMMIT_TITLE=$(git log -1 --pretty=%s)

            echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV
            echo "COMMIT_TITLE=$COMMIT_TITLE" >> $GITHUB_ENV
            echo "USED_DEVICE_TREE_REPO=true" >> $GITHUB_ENV
            echo "DEVICE_TREE_REPO=${{ github.event.inputs.device_tree_repo }}" >> $GITHUB_ENV
            echo "DEVICE_TREE_BRANCH=${{ github.event.inputs.device_tree_branch }}" >> $GITHUB_ENV

      - name: Generate AOSP Device Tree with aospdtgen
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          mkdir -p android/device/tmp/device

          python3 -m aospdtgen dump -o android/device/tmp/device

      - name: Detect Device Info and Relocate Device Tree
        id: detect_device_info
        if: github.event.inputs.generation_type != 'recovery_only'
        run: |
      
          BASE="android/device/tmp"
      
          BRAND=""
          CODENAME=""
      
          # =========================
          # DEVICE TREE MODE (existing)
          # =========================
          if [ "${{ github.event.inputs.generation_type }}" != "vendor_only" ]; then
      
            if [ -d "$BASE" ]; then
      
              DT_PATH=$(find "$BASE" -mindepth 1 -maxdepth 2 -type d | head -n 1)
      
              if [ -z "$DT_PATH" ]; then
                echo "Device tree not found!"
                exit 1
              fi
      
              BOARD_CONFIG="$DT_PATH/BoardConfig.mk"
      
              if [ -f "$BOARD_CONFIG" ]; then
                DEVICE_PATH=$(grep -m1 "DEVICE_PATH" "$BOARD_CONFIG" | cut -d= -f2 | tr -d ' ')
                BRAND=$(echo "$DEVICE_PATH" | cut -d/ -f2)
                CODENAME=$(echo "$DEVICE_PATH" | cut -d/ -f3)
              fi
      
            fi
      
          fi
      
          # =========================
          # VENDOR_ONLY MODE
          # =========================
          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ]; then
      
            FILE=$(find android/device/tmpdt -name extract-files.py | head -n 1)
      
            if [ -z "$FILE" ]; then
              echo "extract-files.py not found!"
              exit 1
            fi
      
            eval "$(python3 -c "
          import re, os

          file_path = '$FILE'

          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()

          match = re.search(r'ExtractUtilsModule\s*\((.*?)\)', content, re.S)

          if not match:
              exit(1)

          strings = re.findall(r\"'([^']+)'\", match.group(1))

          if len(strings) < 2:
              exit(1)

          print(f'CODENAME={strings[0]}')
          print(f'BRAND={strings[1]}')
          ")"

            echo "Parsed from extract-files.py: $BRAND / $CODENAME"    
          fi
      
          # =========================
          # FALLBACK: BoardConfig.mk DEVICE_PATH
          # =========================
          if [ -z "$CODENAME" ] || [ -z "$BRAND" ]; then
            echo "[!] ExtractUtilsModule parsing failed, trying BoardConfig.mk DEVICE_PATH fallback"
      
            BOARD_CONFIG=$(find android/device -name BoardConfig.mk | head -n 1)
      
            if [ -n "$BOARD_CONFIG" ]; then
              DEVICE_PATH=$(grep -m1 "DEVICE_PATH" "$BOARD_CONFIG" | cut -d= -f2 | tr -d ' ')
      
              if [ -n "$DEVICE_PATH" ]; then
                BRAND=$(echo "$DEVICE_PATH" | cut -d/ -f2)
                CODENAME=$(echo "$DEVICE_PATH" | cut -d/ -f3)
              fi
            fi
          fi
      
          if [ -z "$CODENAME" ] || [ -z "$BRAND" ]; then
            echo "Failed to detect device info!"
            exit 1
          fi
      
          echo "Detected device info: $BRAND / $CODENAME"
      
          # =========================
          # EXPORT (shared)
          # =========================
          echo "BRAND=$BRAND" >> $GITHUB_ENV
          echo "CODENAME=$CODENAME" >> $GITHUB_ENV
      
          FINAL_PATH="android/device/$BRAND/$CODENAME"
          mkdir -p "android/device/$BRAND"
      
          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ]; then
            mv android/device/tmpdt "$FINAL_PATH"
          else
            DT_PATH=$(find "$BASE" -mindepth 1 -maxdepth 2 -type d | head -n 1)
            mv "$DT_PATH" "$FINAL_PATH"
            rm -rf "$BASE"
          fi
        
      - name: Auto-fix proprietary-files.txt
        if: contains(github.event.inputs.generation_type, 'device') && github.event.inputs.auto_fix_proprietary == 'true'
        run: |
          FILE="android/device/$BRAND/$CODENAME/proprietary-files.txt"
          DUMP="$GITHUB_WORKSPACE/dump"
          TMP=$(mktemp)
          declare -A seen

          while IFS= read -r line; do

            if [[ "$line" =~ ^#.*$ || -z "$line" ]]; then
              echo "$line" >> $TMP
              continue
            fi

            resolved="$line"

            if [[ ! "$line" =~ ^(system|vendor|product)/ ]]; then
              if [ -f "$DUMP/product/$line" ]; then
                resolved="product/$line"
              elif [ -f "$DUMP/vendor/$line" ]; then
                resolved="vendor/$line"
              elif [ -f "$DUMP/system/$line" ]; then
                resolved="system/$line"
              elif [ -f "$DUMP/system/system/$line" ]; then
                resolved="system/$line"
              else
                resolved="# UNRESOLVED: $line"
              fi
            fi

            if [[ -z "${seen[$resolved]}" ]]; then
              echo "$resolved" >> $TMP
              seen[$resolved]=1
            fi

          done < "$FILE"

          mv $TMP "$FILE"

      - name: Clone Extract Tools from LineageOS
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          mkdir -p android/tools android/prebuilts

          git clone https://github.com/LineageOS/android_tools_extract-utils android/tools/extract-utils
          git clone https://github.com/LineageOS/android_prebuilts_extract-tools android/prebuilts/extract-tools

      - name: Verify Device Tree Existence
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          DT_PATH=$(find android/device/$BRAND -type d -name "$CODENAME" | head -n 1)

          if [ -z "$DT_PATH" ]; then
            echo "Device tree not found!"
            exit 1
          fi

      - name: Extract Vendor Blobs
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          set -e

          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ]; then
            DEVICE_DIR=$(find android/device/$BRAND -maxdepth 2 -type d -name "$CODENAME" | head -n 1)
          else
            DEVICE_DIR="android/device/$BRAND/$CODENAME"
          fi

          if [ ! -d "$DEVICE_DIR" ]; then
            echo "Device directory not found: $DEVICE_DIR"
            exit 1
          fi

          cd "$DEVICE_DIR"
          export PYTHONPATH="$GITHUB_WORKSPACE/android/tools/extract-utils"

          # =========================
          # INPUT SOURCE SELECTION
          # =========================

          if [ "${{ github.event.inputs.generation_type }}" == "vendor_only" ] && \
             [ "${{ github.event.inputs.vendor_source_type }}" == "direct_zip" ]; then

            INPUT_SOURCE="dump/rom.zip"

            if [ ! -f "$GITHUB_WORKSPACE/$INPUT_SOURCE" ]; then
              echo "ERROR: vendor.zip not found at $GITHUB_WORKSPACE/$INPUT_SOURCE"
              exit 1
            fi

            INPUT_SOURCE="$GITHUB_WORKSPACE/$INPUT_SOURCE"

          else
            INPUT_SOURCE="$GITHUB_WORKSPACE/dump"
          fi

          python3 extract-files.py "$INPUT_SOURCE"

      - name: Generate TWRP Device Tree with twrpdtgen
        if: contains(github.event.inputs.generation_type, 'recovery')
        id: twrp_dt
        run: |
          IMG=""
          CUSTOM_IMAGE=${{ github.event.inputs.recovery_image_url }}
          USED_CUSTOM_IMAGE="false"
      
          if [ -n "$CUSTOM_IMAGE" ]; then
            echo "[*] Custom recovery image provided: $CUSTOM_IMAGE"
          
            if [[ "$CUSTOM_IMAGE" =~ ^https?:// ]]; then
              echo "[*] Downloading custom image..."
              mkdir -p custom
              wget -q "$CUSTOM_IMAGE" -O custom/custom_recovery.img
              CUSTOM_IMAGE="custom/custom_recovery.img"
            fi
          
            if [ -f dump/recovery.img ]; then
              IMG="dump/recovery.img"
              echo "[*] Using recovery.img from dumped ROM"
            
            elif [ -f dump/vendor_boot.img ]; then
              IMG="dump/vendor_boot.img"
              echo "[*] Using vendor_boot.img from dumped ROM"
            
            elif [ -f dump/init_boot.img ]; then
              IMG="dump/init_boot.img"
              echo "[*] Using init_boot.img from dumped ROM"
            
            elif [ -f dump/boot.img ]; then
              IMG="dump/boot.img"
              echo "[*] Using boot.img from dumped ROM (fallback)"
            
            else
              IMG="$CUSTOM_IMAGE"
              USED_CUSTOM_IMAGE="true"
              echo "[*] Using provided custom image as fallback."
            fi
          else
            if [ -f dump/recovery.img ]; then
              IMG="dump/recovery.img"
              echo "[*] Using recovery.img from dumped ROM"
          
            elif [ -f dump/vendor_boot.img ]; then
              IMG="dump/vendor_boot.img"
              echo "[*] Using vendor_boot.img from dumped ROM"
          
            elif [ -f dump/init_boot.img ]; then
              IMG="dump/init_boot.img"
              echo "[*] Using init_boot.img from dumped ROM"
          
            elif [ -f dump/boot.img ]; then
              IMG="dump/boot.img"
              echo "[*] Using boot.img from dumped ROM (fallback)"
          
            else
              echo "[*] No recovery/boot/vendor_boot/init_boot image found for TWRP generation"
              exit 0
            fi
          fi
      
          if [ ! -d "twrpdtgen" ]; then
            git clone https://github.com/twrpdtgen/twrpdtgen.git
          fi
      
          python3 -m twrpdtgen "$GITHUB_WORKSPACE/$IMG" -o "recovery/device"
      
          GENERATED_DT=$(find recovery/device -mindepth 2 -type d | head -n 1)
      
          if [ -z "$GENERATED_DT" ]; then
            echo "[!] TWRP device tree not found!"
            exit 1
          fi
      
          BOARD_CONFIG="$GENERATED_DT/BoardConfig.mk"
      
          if [ ! -f "$BOARD_CONFIG" ]; then
            echo "[!] BoardConfig.mk missing in TWRP tree!"
            exit 1
          fi
      
          DEVICE_PATH=$(grep -m1 "DEVICE_PATH" "$BOARD_CONFIG" | cut -d= -f2 | tr -d ' ')
          TWRP_BRAND=$(echo "$DEVICE_PATH" | cut -d/ -f2)
          TWRP_CODENAME=$(echo "$DEVICE_PATH" | cut -d/ -f3)
      
          echo "[*] Detected TWRP device tree: $TWRP_BRAND / $TWRP_CODENAME"
      
          echo "TWRP_BRAND=$TWRP_BRAND" >> $GITHUB_ENV
          echo "TWRP_CODENAME=$TWRP_CODENAME" >> $GITHUB_ENV
          echo "USED_CUSTOM_IMAGE=$USED_CUSTOM_IMAGE" >> $GITHUB_ENV
          echo "FINAL_IMG_USED=$IMG" >> $GITHUB_ENV
      
          # If BRAND/CODENAME are not set, use TWRP values
          if [ -z "${BRAND}" ]; then
            echo "BRAND=$TWRP_BRAND" >> $GITHUB_ENV
          fi
          if [ -z "${CODENAME}" ]; then
            echo "CODENAME=$TWRP_CODENAME" >> $GITHUB_ENV
          fi

      - name: Compress AOSP Device Tree
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          cd android/device/$BRAND/$CODENAME
          7z a -tzip $GITHUB_WORKSPACE/android_device_${BRAND}_${CODENAME}.zip ./*
          cd $GITHUB_WORKSPACE

      - name: Compress Vendor Tree
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          if [ -d "android/vendor/$BRAND/$CODENAME" ]; then
            cd android/vendor/$BRAND/$CODENAME
            7z a -tzip $GITHUB_WORKSPACE/proprietary_vendor_${BRAND}_${CODENAME}.zip ./*
            cd $GITHUB_WORKSPACE
          fi

          rm -rf dump

      - name: Compress Recovery Device Tree
        if: contains(github.event.inputs.generation_type, 'recovery')
        run: |
          BRAND=$BRAND
          CODENAME=$CODENAME

          RECOVERY_DT_PATH="recovery/device/$TWRP_BRAND/$TWRP_CODENAME"

          if [ ! -d "$RECOVERY_DT_PATH" ]; then
            echo "[!] Recovery device tree not found at $RECOVERY_DT_PATH"
            exit 1
          fi

          ZIP_PATH="$GITHUB_WORKSPACE/recovery_device_${TWRP_BRAND}_${TWRP_CODENAME}.zip"
          echo "[*] Compressing recovery device tree into $ZIP_PATH"
          cd "$RECOVERY_DT_PATH"
          7z a -tzip "$ZIP_PATH" ./*

          echo "[*] Recovery device tree compressed successfully!"

      - name: Generate Tag
        id: tag
        run: |

          if [[ -n "$CODENAME" && -n "$TWRP_CODENAME" && "$CODENAME" != "$TWRP_CODENAME" ]]; then
            TAG="${CODENAME}-${TWRP_CODENAME}-$(date +'%Y%m%d-%H%M')"
          else
            TAG="${CODENAME}-$(date +'%Y%m%d-%H%M')"
          fi
      
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        
      - name: Generate Release Body
        id: release_body
        run: |
          BRAND="${{ env.BRAND }}"
          CODENAME="${{ env.CODENAME }}"
          TWRP_BRAND="${{ env.TWRP_BRAND }}"
          TWRP_CODENAME="${{ env.TWRP_CODENAME }}"
          GENERATION_TYPE="${{ github.event.inputs.generation_type }}"
          ROM_URL="${{ github.event.inputs.rom_url }}"

          BODY="Generated Device Trees / Vendor Tree for $CODENAME.
          - Brand: $BRAND
          - Device Codename: $CODENAME
          - Generation Type: $GENERATION_TYPE"

          if [ "${{ env.USED_ROM_URL }}" == "true" ]; then
            BODY="$BODY
          - Dumped ROM Source: $ROM_URL"
          fi

          if [ "${{ env.USED_DEVICE_TREE_REPO }}" == "true" ]; then
            BODY="$BODY
          - Device Tree Repository: ${{ env.DEVICE_TREE_REPO }}
          - Device Tree Branch: ${{ env.DEVICE_TREE_BRANCH }}
          - Device Tree Commit: [${{ env.COMMIT_ID }}](${{ github.event.inputs.device_tree_repo }}/commit/${{ env.COMMIT_ID }}) [${{ env.COMMIT_TITLE }}]"
          fi

          if [ "${{ env.USED_CUSTOM_ZIP }}" == "true" ]; then
            BODY="$BODY
          - Link to Custom ROM ZIP used for extracting vendor blobs: ${{ env.CUSTOM_ZIP_URL }}"
          fi

          if [ -n "$TWRP_BRAND" ] && [ "$TWRP_BRAND" != "$BRAND" ]; then
            BODY="$BODY
          - Recovery Device Brand: $TWRP_BRAND
          - Recovery Device Codename: $TWRP_CODENAME"
          fi

          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
         

      - name: Generate release name
        run: |
          if [[ -n "$TWRP_BRAND" && -n "$TWRP_CODENAME" && ( "$BRAND" != "$TWRP_BRAND" || "$CODENAME" != "$TWRP_CODENAME" ) ]]; then
            echo "RELEASE_NAME=Generated device trees for $BRAND $CODENAME ($TWRP_BRAND $TWRP_CODENAME)" >> $GITHUB_ENV
          else
            echo "RELEASE_NAME=Generated device trees for $BRAND $CODENAME" >> $GITHUB_ENV
          fi

      - name: Create Release and Upload Device & Vendor Trees
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ env.RELEASE_NAME }}
          body:  ${{ env.RELEASE_BODY }}
          files: |
            android_device_*.zip
            recovery_device_*.zip
            proprietary_vendor_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            

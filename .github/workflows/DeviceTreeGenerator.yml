name: Generate Device Tree/Vendor Tree

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'Direct ROM download link (Default: none)'
        required: true
        default: "none"
      generation_type:
        description: 'Select what to generate'
        required: true
        default: "device+vendor+recovery"
        type: choice
        options:
          - device_only
          - recovery_only
          - device+vendor
          - device+recovery
          - device+vendor+recovery
      auto_fix_proprietary:
        description: 'Run auto-fix for proprietary-files.txt'
        required: true
        default: true
        type: boolean    
      recovery_image_path:
        description: 'Direct link to custom recovery.img or boot.img for recovery device tree generation (Optional)'
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y erofs-utils lz4 brotli liblzma-dev wget android-sdk-libsparse-utils cpio p7zip-full

          pip3 install dumpyara aospdtgen twrpdtgen

      - name: Download and dump ROM with dumpyara
        run: |

          if [ "${{ github.event.inputs.rom_url }}" != "none" ]; then
            wget -q --content-disposition "${{ github.event.inputs.rom_url }}"

            ROM_FILE=$(ls -t | head -n 1)

            mkdir -p dump
            
            python3 -m dumpyara "$ROM_FILE" -o dump
            rm "$ROM_FILE"
          else
            echo "No ROM URL provided. Skipping ROM download and dump."
          fi

      - name: Generate AOSP Device Tree with aospdtgen
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          mkdir -p android/device/tmp/device

          python3 -m aospdtgen dump -o android/device/tmp/device

      - name: Detect Device Info and Relocate Device Tree
        if: contains(github.event.inputs.generation_type, 'device')
        id: detect_device_info
        run: |
          BASE="android/device/tmp"

          DT_PATH=$(find "$BASE" -mindepth 1 -maxdepth 2 -type d | head -n 1)

          if [ -z "$DT_PATH" ]; then
            echo "Device tree not found!"
            exit 1
          fi

          BOARD_CONFIG="$DT_PATH/BoardConfig.mk"

          if [ ! -f "$BOARD_CONFIG" ]; then
            echo "BoardConfig.mk not found!"
            exit 1
          fi

          DEVICE_PATH=$(grep -m1 "DEVICE_PATH" "$BOARD_CONFIG" | cut -d= -f2 | tr -d ' ')

          BRAND=$(echo "$DEVICE_PATH" | cut -d/ -f2)
          CODENAME=$(echo "$DEVICE_PATH" | cut -d/ -f3)

          echo "BRAND=$BRAND" >> $GITHUB_ENV
          echo "CODENAME=$CODENAME" >> $GITHUB_ENV

          FINAL_PATH="android/device/$BRAND/$CODENAME"
          mkdir -p "android/device/$BRAND"

          mv "$DT_PATH" "$FINAL_PATH"

          rm -rf "$BASE"

      - name: Auto-fix proprietary-files.txt
        if: contains(github.event.inputs.generation_type, 'device') && github.event.inputs.auto_fix_proprietary == 'true'
        run: |
          FILE="android/device/$BRAND/$CODENAME/proprietary-files.txt"
          DUMP="$GITHUB_WORKSPACE/dump"
          TMP=$(mktemp)
          declare -A seen

          while IFS= read -r line; do

            if [[ "$line" =~ ^#.*$ || -z "$line" ]]; then
              echo "$line" >> $TMP
              continue
            fi

            resolved="$line"

            if [[ ! "$line" =~ ^(system|vendor|product)/ ]]; then
              if [ -f "$DUMP/product/$line" ]; then
                resolved="product/$line"
              elif [ -f "$DUMP/vendor/$line" ]; then
                resolved="vendor/$line"
              elif [ -f "$DUMP/system/$line" ]; then
                resolved="system/$line"
              elif [ -f "$DUMP/system/system/$line" ]; then
                resolved="system/$line"
              else
                resolved="# UNRESOLVED: $line"
              fi
            fi

            if [[ -z "${seen[$resolved]}" ]]; then
              echo "$resolved" >> $TMP
              seen[$resolved]=1
            fi

          done < "$FILE"

          mv $TMP "$FILE"

      - name: Clone Extract Tools from LineageOS
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          mkdir -p android/tools android/prebuilts

          git clone https://github.com/LineageOS/android_tools_extract-utils android/tools/extract-utils
          git clone https://github.com/LineageOS/android_prebuilts_extract-tools android/prebuilts/extract-tools

      - name: Verify Device Tree Existence
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          DT_PATH=$(find android/device/$BRAND -type d -name "$CODENAME" | head -n 1)

          if [ -z "$DT_PATH" ]; then
            echo "Device tree not found!"
            exit 1
          fi

      - name: Extract Vendor Blobs
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          cd android/device/$BRAND/$CODENAME
          export PYTHONPATH=$GITHUB_WORKSPACE/android/tools/extract-utils

          python3 extract-files.py "$GITHUB_WORKSPACE/dump"

      - name: Generate TWRP Device Tree with twrpdtgen
        if: contains(github.event.inputs.generation_type, 'recovery')
        id: twrp_dt
        run: |
          IMG=""
          CUSTOM_IMAGE=${{ github.event.inputs.recovery_image_path }}
      
          if [ -n "${{ github.event.inputs.recovery_image_path }}" ]; then
            echo "[*] Custom recovery image provided: $CUSTOM_IMAGE"
      
            # Download if it's a URL
            if [[ "$CUSTOM_IMAGE" =~ ^https?:// ]]; then
              echo "[*] Downloading custom image..."
              mkdir -p custom
              wget -q "$CUSTOM_IMAGE" -O custom/custom_recovery.img
              CUSTOM_IMAGE="custom/custom_recovery.img"
            fi
      
            if [ -f dump/recovery.img ] || [ -f dump/boot.img ]; then
              echo "[*] Both custom image and dumped ROM images are available. Using dumped ROM image for TWRP generation."
            fi
      
            if [ -f dump/recovery.img ]; then
              IMG="dump/recovery.img"
              echo "[*] Using recovery.img from dumped ROM"
            elif [ -f dump/boot.img ]; then
              IMG="dump/boot.img"
              echo "[*] Using boot.img from dumped ROM (fallback)"
            else
              IMG="$CUSTOM_IMAGE"
              echo "[*] Using provided custom image as fallback."
            fi
          else
            if [ -f dump/recovery.img ]; then
              IMG="dump/recovery.img"
              echo "[*] Using recovery.img from dumped ROM"
            elif [ -f dump/boot.img ]; then
              IMG="dump/boot.img"
              echo "[*] Using boot.img from dumped ROM (fallback)"
            else
              echo "[*] No recovery/boot image found for TWRP generation"
              exit 0
            fi
          fi
      
          if [ ! -d "twrpdtgen" ]; then
            git clone https://github.com/twrpdtgen/twrpdtgen.git
          fi
      
          python3 -m twrpdtgen "$GITHUB_WORKSPACE/$IMG" -o "recovery/device"
      
          GENERATED_DT=$(find recovery/device -mindepth 2 -type d | head -n 1)
      
          if [ -z "$GENERATED_DT" ]; then
            echo "[!] TWRP device tree not found!"
            exit 1
          fi
      
          BOARD_CONFIG="$GENERATED_DT/BoardConfig.mk"
      
          if [ ! -f "$BOARD_CONFIG" ]; then
            echo "[!] BoardConfig.mk missing in TWRP tree!"
            exit 1
          fi
      
          DEVICE_PATH=$(grep -m1 "DEVICE_PATH" "$BOARD_CONFIG" | cut -d= -f2 | tr -d ' ')
          TWRP_BRAND=$(echo "$DEVICE_PATH" | cut -d/ -f2)
          TWRP_CODENAME=$(echo "$DEVICE_PATH" | cut -d/ -f3)
      
          echo "[*] Detected TWRP device tree: $TWRP_BRAND / $TWRP_CODENAME"
      
          echo "TWRP_BRAND=$TWRP_BRAND" >> $GITHUB_ENV
          echo "TWRP_CODENAME=$TWRP_CODENAME" >> $GITHUB_ENV
      
          # If BRAND/CODENAME are not set, use TWRP values
          if [ -z "${BRAND}" ]; then
            echo "BRAND=$TWRP_BRAND" >> $GITHUB_ENV
          fi
          if [ -z "${CODENAME}" ]; then
            echo "CODENAME=$TWRP_CODENAME" >> $GITHUB_ENV
          fi

      - name: Compress AOSP Device Tree
        if: contains(github.event.inputs.generation_type, 'device')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          cd android/device/$BRAND/$CODENAME
          7z a -tzip $GITHUB_WORKSPACE/android_device_${BRAND}_${CODENAME}.zip ./*
          cd $GITHUB_WORKSPACE

      - name: Compress Vendor Tree
        if: contains(github.event.inputs.generation_type, 'vendor')
        run: |
          CODENAME=$CODENAME
          BRAND=$BRAND

          if [ -d "android/vendor/$BRAND/$CODENAME" ]; then
            cd android/vendor/$BRAND/$CODENAME
            7z a -tzip $GITHUB_WORKSPACE/proprietary_vendor_${BRAND}_${CODENAME}.zip ./*
            cd $GITHUB_WORKSPACE
          fi

          rm -rf dump

      - name: Compress Recovery Device Tree
        if: contains(github.event.inputs.generation_type, 'recovery')
        run: |
          BRAND=$BRAND
          CODENAME=$CODENAME

          RECOVERY_DT_PATH="recovery/device/$TWRP_BRAND/$TWRP_CODENAME"

          if [ ! -d "$RECOVERY_DT_PATH" ]; then
            echo "[!] Recovery device tree not found at $RECOVERY_DT_PATH"
            exit 1
          fi

          ZIP_PATH="$GITHUB_WORKSPACE/recovery_device_${TWRP_BRAND}_${TWRP_CODENAME}.zip"
          echo "[*] Compressing recovery device tree into $ZIP_PATH"
          cd "$RECOVERY_DT_PATH"
          7z a -tzip "$ZIP_PATH" ./*

          echo "[*] Recovery device tree compressed successfully!"

      - name: Generate Tag
        id: tag
        run: |

          if [[ -n "$CODENAME" && -n "$TWRP_CODENAME" && "$CODENAME" != "$TWRP_CODENAME" ]]; then
            TAG="${CODENAME}-${TWRP_CODENAME}-$(date +'%Y%m%d-%H%M')"
          else
            TAG="${C_FINAL}-$(date +'%Y%m%d-%H%M')"
          fi
      
          echo "tag=$TAG" >> $GITHUB_OUTPUT
  
          - name: Generate Release Body
            id: release_body
            run: |
             BODY="Generated Device Trees/Vendor Tree for ${{ env.CODENAME }}.
              - Brand: ${{ env.BRAND }}
              - Device Codename: ${{ env.CODENAME }}
              - Generated trees: ${{ github.event.inputs.generation_type }}
              - Dumped ROM link: ${{ github.event.inputs.rom_url }}"
    
              if [[ "${{ env.BRAND }}" != "${{ env.TWRP_BRAND }}" || "${{ env.CODENAME }}" != "${{ env.TWRP_CODENAME }}" ]]; then
                BODY="$BODY
              - Detected recovery device brand: ${{ env.TWRP_BRAND }}
              - Detected recovery device codename: ${{ env.TWRP_CODENAME }}"
             fi
             
             echo "RELEASE_BODY=$BODY" >> $GITHUB_ENV
    
          - name: Create Release and Upload Device & Vendor Trees
            uses: softprops/action-gh-release@v2
            with:
              tag_name: ${{ steps.tag.outputs.tag }}
              name: ${{ (env.BRAND != env.TWRP_BRAND || env.CODENAME != env.TWRP_CODENAME) && format('Generated device trees for {0} {1} ({2} {3})', env.BRAND, env.CODENAME, env.TWRP_BRAND, env.TWRP_CODENAME) || format('Generated device trees for {0} {1}', env.BRAND, env.CODENAME) }}
              body:  ${{ env.RELEASE_BODY }}
              files: |
                android_device_*.zip
                recovery_device_*.zip
                proprietary_vendor_*.zip
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            
